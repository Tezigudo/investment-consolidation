services:
  postgres:
    # PG 18 (Sep 2025). Note: cloud providers (Neon/Supabase/Fly) may
    # still cap at 16-17 — production deployment will likely have to
    # match, but local dev runs whatever.
    image: postgres:18-alpine
    container_name: consolidate-pg
    environment:
      POSTGRES_USER: consolidate
      POSTGRES_PASSWORD: consolidate
      POSTGRES_DB: consolidate
    ports:
      - "5432:5432"
    volumes:
      - consolidate-pg-18:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consolidate -d consolidate"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  # Note the `-18` suffix — different volume from the old PG 16 one so
  # there's no risk of pointing PG 18 at a 16-format datadir (it won't
  # boot). The old `consolidate-pg` volume is still on disk; dump from
  # it first if you need the data, then `docker volume rm consolidate-pg`.
  consolidate-pg-18:
